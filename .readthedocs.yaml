version: 2

# Build PDF & ePub
formats:
  - epub
  - pdf

# Python version
python:
  version: "3.11"
  install:
    - requirements: docs/requirements.txt
    - method: pip
      path: .

# Sphinx configuration
sphinx:
  configuration: docs/conf.py

# Build settings
build:
  os: ubuntu-20.04
  tools:
    python: "3.11"

